<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Log Event Pipeline</title>
        <style>
            body {
            font-family: sans-serif;
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
            }

            h1 {
            margin-bottom: 0.5rem;
            }

            #status {
            margin-bottom: 1rem;
            font-size: 0.95rem;
            }

            #events {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            }

            .event {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 0.75rem;
            }

            .meta {
            font-size: 0.9rem;
            margin-bottom: 0.35rem;
            }

            .level {
            font-weight: bold;
            }

            .message {
            white-space: pre-wrap;
            }
        </style>
        <script src="main.js" defer></script>
    </head>
    <body>
        <h1>Error Events </h1>
        <div id="status">Connecting ...</div>
        <div id="events"></div>
    </body>
</html>
